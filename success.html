<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успішна | Матриця Долі</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top center, #f5fff7 0%, #ffffff 100%); /* Легкий відтінок зеленого для успіху */
            --accent-color: #1a1a1a;
            --text-main: #1a1a1a;
            --text-secondary: #666;
            --grid-color: rgba(0, 0, 0, 0.03);
            --success-color: #27ae60;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Фонова сітка */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        /* Іконка успіху або емодзі */
        .status-icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: inline-block;
        }

        h1 {
            font-size: clamp(28px, 6vw, 42px);
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .status-text {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        /* Кнопка Telegram */
        .btn-telegram {
            display: none; /* З'явиться через JS */
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            padding: 18px 24px;
            border-radius: 16px;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-telegram:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            opacity: 0.9;
        }

        /* Анімація завантаження (крапки) */
        .loading-dots:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            40% { color: var(--text-secondary); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .25em 0 0 var(--text-secondary), .5em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .25em 0 0 var(--text-secondary), .5em 0 0 var(--text-secondary); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-icon" id="icon">⏳</div>
        <h1 id="headline">Перевірка оплати</h1>
        <p class="status-text" id="status">Будь ласка, зачекайте 3-5 секунд<span class="loading-dots"></span></p>
        
        <a id="botLink" class="btn-telegram">
            Відкрити Telegram бот
        </a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const order = params.get("order");

        const botUsername = "PathOfTarot_bot";
        // const API_URL = "https://validatetoken-dwtlhl22ra-uc.a.run.app";
        const API_URL = "https://validatetoken-dwtlhl22ra-uc.a.run.app";

        async function checkPayment() {
            if (!order) {
                document.getElementById("status").innerText = "Помилка: номер замовлення не знайдено";
                document.getElementById("icon").innerText = "❌";
                return;
            }

            try {
                // Очікування обробки платежу
                await new Promise((r) => setTimeout(r, 4000));

                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ orderReference: order }),
                });

                const data = await res.json();

                if (!data.valid || !data.token) {
                    document.getElementById("status").innerText = "Платіж ще обробляється. Оновіть сторінку через 10 секунд.";
                    document.getElementById("icon").innerText = "🔄";
                    return;
                }

                // Успіх
                document.getElementById("icon").innerText = "✅";
                document.getElementById("headline").innerText = "Оплата успішна!";
                document.getElementById("status").innerText = "Доступ активовано. Натисніть кнопку нижче, щоб почати навчання.";
                document.getElementById("status").style.color = "var(--success-color)";

                const botLink = document.getElementById("botLink");
                botLink.href = `https://t.me/${botUsername}?start=${data.token}`;
                botLink.style.display = "block";
                
            } catch (e) {
                document.getElementById("status").innerText = "Помилка з'єднання. Спробуйте оновити сторінку.";
                document.getElementById("icon").innerText = "⚠️";
                console.error(e);
            }
        }

        checkPayment();
    </script>
</body>
</html>
